services:
  - type: web
    name: blackbox-transfer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run src/services/frontend/app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
